      - workspace
      - targetUrl
      - active
      - autoDeactivated
      - autoDeactivateReason
      - version
      properties:
        id:
          type: integer
          description: Resthook subscription's ID.
        event:
          $ref: '#/components/schemas/ResthookEvent'
        organization:
          $ref: '#/components/schemas/Organization'
          nullable: true
        workspace:
          $ref: '#/components/schemas/ResthookSubscriptionWorkspace'
          nullable: true
        targetUrl:
          type: string
          description: URL of the resthook's receiver.
          example: https://my-site.com/receive
        active:
          type: boolean
          description: Resthooks only fire for active subscriptions.
          example: true
        autoDeactivated:
          type: boolean
          description: Resthook subscriptions can be auto deactivated if the receiver continuously returns error status code
            over a period of time.
          example: true
        autoDeactivateReason:
          type: string
          description: The reason for the subscription being auto deactivated. May contains the error response that the receiver
            returned.
          example: 'Resthook fails after 10 retries. The last error received was: 500 - Internal server error.'
        version:
          type: string
          enum:
          - v1
          - v2
          - v3
          description: Version of the resthook subscription. Determines the resthook body being fired.
          example: v3
