naftiko: 1.0.0-alpha2
info:
  label: Affinda Workspaces API — Workspaces
  description: Affinda Workspaces — list, create, get, update, delete workspaces and read workspace usage.
  tags:
  - Affinda
  - Workspaces
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    AFFINDA_API_KEY: AFFINDA_API_KEY
capability:
  consumes:
  - type: http
    namespace: workspaces
    baseUri: https://api.affinda.com
    description: Affinda v3 Workspaces resource.
    resources:
    - name: v3-workspaces
      path: /v3/workspaces
      operations:
      - name: listworkspaces
        method: GET
        description: List workspaces in the organization.
        outputRawFormat: json
        outputParameters:
        - name: results
          type: object
          value: $.
        inputParameters: []
      - name: createworkspace
        method: POST
        description: Create a workspace.
        outputRawFormat: json
        outputParameters:
        - name: workspace
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: v3-workspaces-identifier
      path: /v3/workspaces/{identifier}
      operations:
      - name: getworkspace
        method: GET
        description: Retrieve a workspace by identifier.
        outputRawFormat: json
        outputParameters:
        - name: workspace
          type: object
          value: $.
        inputParameters:
        - name: identifier
          in: path
          type: string
          required: true
      - name: updateworkspace
        method: PATCH
        description: Update a workspace.
        outputRawFormat: json
        outputParameters:
        - name: workspace
          type: object
          value: $.
        inputParameters:
        - name: identifier
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
      - name: deleteworkspace
        method: DELETE
        description: Delete a workspace.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: identifier
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: 'Bearer {{env.AFFINDA_API_KEY}}'
      placement: header
  exposes:
  - type: mcp
    namespace: workspaces-mcp
    port: 9090
    transport: http
    description: MCP adapter for Affinda Workspaces.
    tools:
    - name: affinda-list-workspaces
      description: List Affinda workspaces.
      hints: {readOnly: true, destructive: false, idempotent: true}
      call: workspaces.listworkspaces
      outputParameters: [{type: object, mapping: $.}]
    - name: affinda-create-workspace
      description: Create a new Affinda workspace.
      hints: {readOnly: false, destructive: false, idempotent: false}
      call: workspaces.createworkspace
      with: {body: tools.body}
      outputParameters: [{type: object, mapping: $.}]
    - name: affinda-get-workspace
      description: Get an Affinda workspace by identifier.
      hints: {readOnly: true, destructive: false, idempotent: true}
      call: workspaces.getworkspace
      with: {identifier: tools.identifier}
      outputParameters: [{type: object, mapping: $.}]
